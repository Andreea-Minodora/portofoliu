<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezervare</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url(background.jpg);
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Rezervare</h2>
    <form action="rezervari.php" method="POST">
        <label for="nume">Nume:</label>
        <input type="text" name="nume" required>

        <label for="email">Email:</label>
        <input type="email" name="email" required>

        <label for="nr_pers">Număr de persoane:</label>
        <input type="number" name="nr_pers" required>

        <label for="data_rezerv">Data rezervării:</label>
        <input type="date" name="data_rezerv" required>

        <label for="ora_rezerv">Ora rezervării:</label>
        <input type="time" name="ora_rezerv" required>

        <label for="comentarii">Comentarii:</label>
        <textarea name="comentarii"></textarea>

        <button type="submit">Trimite rezervarea</button>
    </form>
</div>

</body>
</html>
